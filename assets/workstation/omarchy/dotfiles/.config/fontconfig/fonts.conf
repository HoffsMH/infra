<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  System-wide default font choices for this Omarchy host.
  Symlinked from ~/infra/assets/workstation/omarchy/dotfiles/.config/fontconfig/fonts.conf
  to ~/.config/fontconfig/fonts.conf.

  Equivalent to the nix `fonts.fontconfig.defaultFonts` block. Apps that
  resolve fonts via fontconfig (most modern apps such as terminals,
  GTK apps, and browsers without explicit font-family) pick these up.

  Apps that hard-code a font-family name (e.g. a ghostty config with
  `font-family = "X"`) override these. To make those apps inherit, set
  their font-family to "monospace" / "sans-serif" / "serif".
-->
<fontconfig>

  <alias>
    <family>monospace</family>
    <prefer>
      <!--
        BlexMono is the IBM Plex Mono fork from the Nerd Fonts project,
        with extra glyphs (powerline, devicons, etc) baked in.
        Use the "Mono" subfamily so all glyphs are guaranteed
        equal-width. The proportional "BlexMono Nerd Font" face lets
        some wide glyphs drift, which can disturb terminals.
      -->
      <family>BlexMono Nerd Font Mono</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>IBM Plex Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>IBM Plex Serif</family>
    </prefer>
  </alias>

</fontconfig>
