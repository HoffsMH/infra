# Personal Hyprland layer — declarative.
# Source LAST in hyprland.conf so these always win over omarchy defaults.
#
# Two prefixes in play (see ~/infra/assets/workstation/omarchy/keyboard.md
# when written):
#   left-of-spacebar (xremap turns LeftAlt into Ctrl, with tap=Esc)
#       -> use as a Mac Cmd-equivalent for app-level shortcuts
#   right-of-spacebar (xremap turns RightAlt into HYPER chord
#                      = SUPER+CTRL+ALT held simultaneously)
#       -> personal layer prefix; bind with `SUPER CTRL ALT, <key>`
#
# SUPER (Win key) is left for omarchy defaults (terminal launch, browser,
# clipboard manager, scratchpad, etc.) and SUPER+drag mouse.

# ===== Mac muscle-memory layer (left-of-spacebar = Ctrl) =====
bindd = CTRL, Q,     Close window,    killactive,
bindd = CTRL, SPACE, Launch apps,     exec, omarchy-launch-walker
bindd = SUPER CTRL, SPACE, Omarchy menu, exec, omarchy-menu
# Mac Cmd+Shift+4 region screenshot. Ctrl+Shift+4 after the keyboard remap.
bindd = CTRL SHIFT, code:13, Screenshot (region), exec, omarchy-cmd-screenshot

# ===== HYPER (right-of-spacebar) personal layer =====

# Window-action bindings
bindd = SUPER CTRL ALT, P, Deck (maximize),       fullscreen, 1
bindd = SUPER CTRL ALT, J, Cycle next window,     cyclenext
bindd = SUPER CTRL ALT, K, Cycle previous window, cyclenext, prev

# Spawn terminal on HYPER+RETURN (replaces omarchy default SUPER+RETURN,
# which is unbound in omarchy-unbinds.conf).
bindd = SUPER CTRL ALT, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"

# Workspace switch — HYPER + Q/W/E/R for ws 1-4, + 5/6/7 for ws 5-7
# (5 = WoW/games on DP-1; 6/7 = secondary monitor)
bindd = SUPER CTRL ALT, Q,        Workspace 1, workspace, 1
bindd = SUPER CTRL ALT, W,        Workspace 2, workspace, 2
bindd = SUPER CTRL ALT, E,        Workspace 3, workspace, 3
bindd = SUPER CTRL ALT, R,        Workspace 4, workspace, 4
bindd = SUPER CTRL ALT, code:14,  Workspace 5 (games), workspace, 5
bindd = SUPER CTRL ALT, code:15,  Workspace 6 (Acer),  workspace, 6
bindd = SUPER CTRL ALT, code:16,  Workspace 7 (Acer),  workspace, 7

# Move active window to workspace WITHOUT following (movetoworkspacesilent)
bindd = SUPER CTRL ALT SHIFT, Q,        Move window to ws 1, movetoworkspacesilent, 1
bindd = SUPER CTRL ALT SHIFT, W,        Move window to ws 2, movetoworkspacesilent, 2
bindd = SUPER CTRL ALT SHIFT, E,        Move window to ws 3, movetoworkspacesilent, 3
bindd = SUPER CTRL ALT SHIFT, R,        Move window to ws 4, movetoworkspacesilent, 4
bindd = SUPER CTRL ALT SHIFT, code:14,  Move window to ws 5, movetoworkspacesilent, 5
bindd = SUPER CTRL ALT SHIFT, code:15,  Move window to ws 6, movetoworkspacesilent, 6
bindd = SUPER CTRL ALT SHIFT, code:16,  Move window to ws 7, movetoworkspacesilent, 7

# ===== Window rules =====

# WoW (Battle.net via Lutris/umu/Proton; Hyprland sees class=steam_app_default)
windowrule {
  name = wow
  match:class = ^(steam_app_default)$
  match:title = ^(World of Warcraft)$
  workspace = 5 silent
  fullscreen = 1
  idle_inhibit = fullscreen
  immediate = 1
  tag = -default-opacity
  opacity = 1 1
}
