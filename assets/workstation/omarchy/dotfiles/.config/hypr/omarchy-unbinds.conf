# Opt-outs from omarchy default Hyprland bindings.
# Source AFTER omarchy defaults but BEFORE personal.conf in hyprland.conf.
#
# Audit and update this file when `omarchy-update` brings in new defaults
# that conflict with the personal layer.

# --- Workspace switching: moved to HYPER (right-of-spacebar) layer ---
unbind = SUPER, code:10   # 1
unbind = SUPER, code:11   # 2
unbind = SUPER, code:12   # 3
unbind = SUPER, code:13   # 4
unbind = SUPER, code:14   # 5
unbind = SUPER, code:15   # 6
unbind = SUPER, code:16   # 7
unbind = SUPER, code:17   # 8
unbind = SUPER, code:18   # 9
unbind = SUPER, code:19   # 0

# --- Move-to-workspace: moved to HYPER+SHIFT ---
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

# --- Move-silent (originally SUPER+SHIFT+ALT+N): replaced by HYPER+SHIFT
# (which uses movetoworkspacesilent in personal.conf -- "move without follow")
unbind = SUPER SHIFT ALT, code:10
unbind = SUPER SHIFT ALT, code:11
unbind = SUPER SHIFT ALT, code:12
unbind = SUPER SHIFT ALT, code:13
unbind = SUPER SHIFT ALT, code:14
unbind = SUPER SHIFT ALT, code:15
unbind = SUPER SHIFT ALT, code:16
unbind = SUPER SHIFT ALT, code:17
unbind = SUPER SHIFT ALT, code:18
unbind = SUPER SHIFT ALT, code:19

# --- TAB workspace nav: SUPER+drag mouse stays, TAB nav moves to HYPER ---
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER CTRL, TAB

# --- Override SUPER+CTRL+SPACE (theme background menu) so the omarchy menu
# is reachable via "win-key + left-of-space + space" (= SUPER+CTRL+SPACE
# after our xremap left-of-space-as-Ctrl swap). The omarchy menu itself can
# still launch the theme background submenu.
unbind = SUPER CTRL, SPACE

# --- Move terminal launch off SUPER+RETURN onto HYPER+RETURN ---
# Replacement bind in personal.conf.
unbind = SUPER, RETURN
