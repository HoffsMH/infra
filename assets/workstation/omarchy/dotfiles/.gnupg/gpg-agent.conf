# gpg-agent configuration for this Omarchy host.
# Source of truth in ~/infra/assets/workstation/omarchy/dotfiles/.gnupg/gpg-agent.conf
# Symlinked to ~/.gnupg/gpg-agent.conf by setup-yubikey.sh.

# Make gpg-agent also serve as the SSH agent (so the YubiKey AUT subkey is
# offered for SSH auth via $SSH_AUTH_SOCK).
enable-ssh-support

# Cache the PIN so YubiKey touches don't require re-typing it constantly,
# while still expiring within a session.
default-cache-ttl 600
max-cache-ttl 7200

# Pinentry binary. Modern Arch only ships pinentry-gtk (GTK3), -gnome3,
# -qt, -curses, -tty; pinentry-gtk-2 no longer exists. -gnome3 is the
# best fit for a Hyprland/Wayland session because it uses GTK3+libsecret
# and is the most-tested option under modern Wayland desktops.
pinentry-program /usr/bin/pinentry-gnome3
